# Render blueprint: a web service for the TAN webhook + a Redis instance.
# Deploy by connecting this repo in the Render dashboard ("Blueprints").
services:
  - type: web
    name: elegansky-crdb-disburser
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: TAN_WEBHOOK_SECRET
        sync: false # set this manually in the dashboard; keep it secret
      - key: REDIS_URL
        fromService:
          type: redis
          name: elegansky-crdb-redis
          property: connectionString
      - key: TAN_LENGTH
        value: "6"
      - key: TAN_TTL_SECONDS
        value: "300"
      - key: ALLOWED_SENDERS
        value: "CRDB,CRDB-BANK,CRDB BANK,CRDBBANK"

  # Disburse worker (Playwright + chromium via the Playwright Docker image).
  # Runs a disbursement cycle every DISBURSE_INTERVAL_MINUTES. Reports its live
  # status to the web service, which serves it at /live.
  - type: worker
    name: elegansky-crdb-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    envVars:
      - key: TAN_WEBHOOK_SECRET
        sync: false # MUST match the web service's secret
      - key: DATABASE_URL
        sync: false # Supabase session pooler (port 5432) — keep secret
      - key: BANK_USERNAME
        sync: false
      - key: BANK_PASSWORD
        sync: false
      - key: WEBHOOK_BASE_URL
        value: "https://elegansky-crdb-disburser.onrender.com"
      - key: BANK_FROM_ACCOUNT
        value: "10346845061"
      - key: BANK_HEADLESS
        value: "true"
      - key: DISBURSE_DRY_RUN
        value: "true" # START SAFE — flip to false only when you go live
      - key: DISBURSE_INTERVAL_MINUTES
        value: "30"
      - key: DISBURSE_OFFSET_MINUTES
        value: "0" # fires at :00 and :30
      - key: WORKER_ID
        value: "worker-render-1"

  # Second worker — same code, offset 15 min for redundancy + staggered coverage.
  - type: worker
    name: elegansky-crdb-worker-2
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    envVars:
      - key: TAN_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BANK_USERNAME
        sync: false
      - key: BANK_PASSWORD
        sync: false
      - key: WEBHOOK_BASE_URL
        value: "https://elegansky-crdb-disburser.onrender.com"
      - key: BANK_FROM_ACCOUNT
        value: "10346845061"
      - key: BANK_HEADLESS
        value: "true"
      - key: DISBURSE_DRY_RUN
        value: "true"
      - key: DISBURSE_INTERVAL_MINUTES
        value: "30"
      - key: DISBURSE_OFFSET_MINUTES
        value: "15" # fires at :15 and :45 — 15 min after worker 1
      - key: WORKER_ID
        value: "worker-render-2"

  # Statement-pull worker (Playwright + chromium). Runs both NMB and CRDB
  # statement-pull cycles every STATEMENT_INTERVAL_MINUTES, NMB first then
  # CRDB (sequential — they share the same SMS-relay phone for OTPs).
  # Today-only window; processor dedups so re-ingesting the same day repeatedly
  # within the 30-min schedule is safe.
  - type: worker
    name: elegansky-statement-pull
    runtime: docker
    dockerfilePath: ./Dockerfile.statementPull
    plan: starter
    envVars:
      - key: TAN_WEBHOOK_SECRET
        sync: false # MUST match the web service's secret
      - key: WEBHOOK_BASE_URL
        value: "https://elegansky-crdb-disburser.onrender.com"
      - key: TRANSACTION_PROCESSOR_URL
        value: "https://transaction-processor-1-mi4p.onrender.com"
      # NMB creds — set in dashboard, never commit.
      - key: NMB_USERNAME
        sync: false
      - key: NMB_PASSWORD
        sync: false
      - key: NMB_ACCOUNT_NUMBER
        sync: false
      - key: NMB_HEADLESS
        value: "true"
      # CRDB creds — set in dashboard, never commit. Note: these are the
      # personal/savings account creds, NOT the disburser BANK_USERNAME
      # (which is the corporate lending account).
      - key: CRDB_USERNAME
        sync: false
      - key: CRDB_PASSWORD
        sync: false
      - key: CRDB_ACCOUNT_NUMBER
        sync: false
      - key: CRDB_HEADLESS
        value: "true"
      # Schedule
      - key: STATEMENT_INTERVAL_MINUTES
        value: "30"
      - key: STATEMENT_OFFSET_MINUTES
        value: "0" # fires at :00 and :30
      - key: STATEMENT_PULL_PAUSED
        value: "false" # flip to "true" in the dashboard to halt cycles
      - key: TAN_LENGTH
        value: "6" # CRDB; NMB scraper handles 5-digit OTPs too

      # Cycle reporting → BRAIN dashboard. After each NMB/CRDB tick the worker
      # POSTs status + screenshots here. Secret must match BRAIN's env var.
      - key: BRAIN_REPORT_URL
        value: "https://elegansky-brain.onrender.com/api/cycles"
      - key: STATEMENT_REPORT_SECRET
        sync: false # set in dashboard; must match BRAIN's value

  - type: redis
    name: elegansky-crdb-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: [] # only reachable from Render services
